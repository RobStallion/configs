[settings]
# Shimless mode is enabled via `mise activate zsh` in zsh/mise.zsh.
# No shims directory — PATH is injected directly on cd.
trusted_config_paths = ["~/code"]

[tools]
node = "24"
"npm:typescript-language-server" = { version = "5", node = "24" }
"npm:typescript" = { version = "6", node = "24" }

