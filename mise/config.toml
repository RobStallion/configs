[settings]
# Shimless mode is enabled via `mise activate zsh` in zsh/mise.zsh.
# No shims directory — PATH is injected directly on cd.
trusted_config_paths = ["~/code"]

[tools]
node = "26"
go = "1"
uv = "0.11"
python = "3.14"
deno = "2"
bun = "latest"

erlang = "latest"
elixir = "latest"

kubectl = "1.36"
yq = "4.53.2"

# kustomize = "5.8.1"
# terraform = "1.15"
# gomplate = "5.1.0"

# vtsls is the LSP for Node/TS projects (replaces typescript-language-server
# for better refactorings: file-rename, add-all-missing-imports, etc.). Global
# `typescript` is the fallback tsserver used when a project doesn't ship its
# own. Orphan JS/TS files are handled by deno.
"npm:@vtsls/language-server" = { version = "latest", node = "24" }
"npm:typescript" = { version = "6", node = "24" }
"npm:vscode-json-languageserver" = "latest"
