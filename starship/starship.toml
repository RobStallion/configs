add_newline = true

# Top-level keys (`format`, `right_format`, `palette`) MUST appear BEFORE any
# [table] header — TOML rule: once a [section] starts, every following
# `key = value` is part of that section. Putting `format` after [palettes.rcm]
# silently moves it into the palette table and starship falls back to defaults.

palette = "rcm"

format = """
$directory\
$nodejs\
$python\
$ruby\
$cmd_duration\
$status\
$character\
"""

# Right-aligned: contextual info that's nice to glance at but not the primary
# focus (kube context, git branch, git status). Keeps the left side clean.
right_format = """
${custom.kube}\
$git_branch\
$git_status\
"""

[character]
success_symbol = "[➜](bold green)"
error_symbol = "[➜](bold red)"

[status]
# Shows the actual exit code on failure (e.g. 127 = not found, 130 = SIGINT).
# The red ➜ from [character] still fires too — this just adds the number.
disabled = false
format = "[$symbol$status]($style) "
symbol = "✘ "
style = "bold red"

[directory]
style = "bold cyan"
truncation_length = 3
truncate_to_repo = true       # in a repo: show path relative to repo root
truncation_symbol = "…/"      # leading "…/" when path is truncated
format = "[$path]($style) "

# Optional: per-dir aliases. Uncomment + tweak to shorten common paths.
# [directory.substitutions]
# "~/code/personal" = "personal"
# "~/code/work"     = "work"

[cmd_duration]
min_time = 2000
format = "took [$duration](yellow) "

[aws]
disabled = true

[kubernetes]
disabled = true  # replaced by custom.kube below

# Show kube context anywhere within a project that has a kube manifests dir.
# detect_folders triggers on the parent (dir that contains kube/k8s/__kube__),
# but disappears once you cd into those dirs. This custom module walks to the
# git root and checks there instead, so context stays visible throughout the
# project tree.
[custom.kube]
command = "kubectl config current-context"
when = 'command -v kubectl > /dev/null 2>&1 && root=$(git rev-parse --show-toplevel 2>/dev/null) && (test -d "$root/kube" || test -d "$root/k8s" || test -d "$root/__kube__")'
symbol = "⎈ "
style = "bold peach"
format = "[$symbol$output]($style) "

[gcloud]
disabled = true

[git_branch]
format = "[$branch](blue) "

[git_status]
format = "$all_status$ahead_behind"
conflicted = "[!](bold red)"
staged = "[+](green)"
modified = "[·](yellow)"
untracked = "[?](bright-black)"
deleted = "[✘](red)"
# Use a TOML literal string ('...') so the leading $ stays literal —
# starship treats unescaped $ in basic strings as a variable prefix.
stashed = '[\$](purple)'
renamed = "[»](cyan)"
ahead = "[↑](cyan)"
behind = "[↓](red)"
diverged = "[↕](bold red)"

[nodejs]
format = "[node $version](green) "

[python]
format = "[py $version](yellow) "

[ruby]
format = "[rb $version](red) "

# ── Palettes ──────────────────────────────────────────────────────────────────
# Defined LAST so the table header doesn't absorb top-level keys above. Add
# new palettes below and switch via the top-level `palette = "..."` line.
[palettes.rcm]
peach = "#f5a97f"
