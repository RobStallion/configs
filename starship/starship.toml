add_newline = true

# Top-level keys (`format`, `right_format`, `palette`) MUST appear BEFORE any
# [table] header вҖ” TOML rule: once a [section] starts, every following
# `key = value` is part of that section. Putting `format` after [palettes.rcm]
# silently moves it into the palette table and starship falls back to defaults.

palette = "rcm"

format = """
$directory\
$nodejs\
$python\
$ruby\
$cmd_duration\
$status\
$character\
"""

# Right-aligned: contextual info that's nice to glance at but not the primary
# focus (kube context, git branch, git status). Keeps the left side clean.
right_format = """
$kubernetes\
$git_branch\
$git_status\
"""

[character]
success_symbol = "[вһң](bold green)"
error_symbol = "[вһң](bold red)"

[status]
# Shows the actual exit code on failure (e.g. 127 = not found, 130 = SIGINT).
# The red вһң from [character] still fires too вҖ” this just adds the number.
disabled = false
format = "[$symbol$status]($style) "
symbol = "вңҳ "
style = "bold red"

[directory]
style = "bold cyan"
truncation_length = 3
truncate_to_repo = true       # in a repo: show path relative to repo root
truncation_symbol = "вҖҰ/"      # leading "вҖҰ/" when path is truncated
format = "[$path]($style) "

# Optional: per-dir aliases. Uncomment + tweak to shorten common paths.
# [directory.substitutions]
# "~/code/personal" = "personal"
# "~/code/work"     = "work"

[cmd_duration]
min_time = 2000
format = "took [$duration](yellow) "

[aws]
disabled = true

[kubernetes]
disabled = false
symbol = "вҺҲ "
format = "[$symbol$context](bold peach) "
# Only render when inside a repo with kube manifests. Detected by folder name вҖ”
# common patterns across repos: `kube/`, `k8s/`, `__kube__/`.
detect_folders = ["kube", "k8s", "__kube__"]

[gcloud]
disabled = true

[git_branch]
format = "[$branch](blue) "

[git_status]
format = "$all_status$ahead_behind"
conflicted = "[!](bold red)"
staged = "[+](green)"
modified = "[В·](yellow)"
untracked = "[?](bright-black)"
deleted = "[вңҳ](red)"
# Use a TOML literal string ('...') so the leading $ stays literal вҖ”
# starship treats unescaped $ in basic strings as a variable prefix.
stashed = '[\$](purple)'
renamed = "[В»](cyan)"
ahead = "[вҶ‘](cyan)"
behind = "[вҶ“](red)"
diverged = "[вҶ•](bold red)"

[nodejs]
format = "[node $version](green) "

[python]
format = "[py $version](yellow) "

[ruby]
format = "[rb $version](red) "

# в”Җв”Җ Palettes в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Defined LAST so the table header doesn't absorb top-level keys above. Add
# new palettes below and switch via the top-level `palette = "..."` line.
[palettes.rcm]
peach = "#f5a97f"
