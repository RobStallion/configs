add_newline = true

format = """
$directory\
$nodejs\
$python\
$ruby\
$kubernetes\
$cmd_duration\
$character\
"""

right_format = """
$git_branch\
$git_status\
"""

[character]
success_symbol = "[➜](bold green)"
error_symbol = "[➜](bold red)"

[directory]
style = "bold cyan"
truncation_length = 3
truncate_to_repo = true       # in a repo: show path relative to repo root
truncation_symbol = "…/"      # leading "…/" when path is truncated
format = "[$path]($style) "

# Optional: per-dir aliases. Uncomment + tweak to shorten common paths.
# [directory.substitutions]
# "~/code/personal" = "personal"
# "~/code/work"     = "work"

[cmd_duration]
min_time = 2000
format = "took [$duration](yellow) "

[aws]
disabled = true

[kubernetes]
disabled = false
symbol = "⎈ "
format = "[$symbol$context](bold #f5a97f) "
# Only render when inside a repo with kube manifests. Detected by folder name —
# common patterns across repos: `kube/`, `k8s/`, `__kube__/`.
detect_folders = ["kube", "k8s", "__kube__"]

[gcloud]
disabled = true

[git_branch]
format = "[$branch](blue) "

[git_status]
format = "$all_status$ahead_behind"
conflicted = "[!](bold red)"
staged = "[+](green)"
modified = "[·](yellow)"
untracked = "[?](bright-black)"
deleted = "[✘](red)"
stashed = "[$](purple)"
renamed = "[»](cyan)"
ahead = "[↑](cyan)"
behind = "[↓](red)"
diverged = "[↕](bold red)"

[nodejs]
format = "[node $version](green) "

[python]
format = "[py $version](yellow) "

[ruby]
format = "[rb $version](red) "
