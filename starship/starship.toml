add_newline = false

format = """
$character\
$directory\
$kubernetes\
$nodejs\
$python\
$ruby\
$cmd_duration\
"""

right_format = """
$git_branch\
$git_status\
"""

[character]
success_symbol = "[➜](bold green)"
error_symbol = "[➜](bold red)"

[directory]
style = "bold cyan"
truncation_length = 3
truncate_to_repo = true       # in a repo: show path relative to repo root
truncation_symbol = "…/"      # leading "…/" when path is truncated
format = "[$path]($style) "

# Optional: per-dir aliases. Uncomment + tweak to shorten common paths.
# [directory.substitutions]
# "~/code/personal" = "personal"
# "~/code/work"     = "work"

[cmd_duration]
min_time = 2000
format = "took [$duration](yellow) "

[aws]
disabled = true

[kubernetes]
disabled = false
symbol = "⎈ "
format = "[$symbol$context](bold #f5a97f) "

[gcloud]
disabled = true

[git_branch]
symbol = ""
format = "[$branch](blue) "

[git_status]
format = "[$all_status](yellow)"
conflicted = "!"
staged = "+"
modified = "·"
untracked = "?"
deleted = "✘"
stashed = "$"
renamed = "»"
ahead = "↑"
behind = "↓"
diverged = "↕"

[nodejs]
symbol = ""
format = "[node $version](green) "

[python]
symbol = ""
format = "[py $version](yellow) "

[ruby]
symbol = ""
format = "[rb $version](red) "
