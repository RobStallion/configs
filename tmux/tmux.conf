# ── Prefix ────────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Core settings ──────────────────────────────────────────────────────────────
set -g escape-time 0          # no delay after Escape (critical for nvim)
set -g history-limit 50000
set -g display-time 3000
set -g status-interval 5      # re-render status bar every 5s (cd hook updates instantly)
set -g focus-events on        # lets nvim know when window gains/loses focus
set -g mouse on               # pane-scoped selection + scroll; hold Option to use terminal-native select

set -g default-terminal "tmux-256color"
# RGB + extended keys (Shift+Enter, etc.) for Ghostty and other xterm-derived terminals.
# xterm* glob matches "xterm-ghostty"; terminal-features is the modern way (vs terminal-overrides).
set -s extended-keys on
set -as terminal-features 'xterm*:RGB,extkeys'

# ── Window / pane numbering ────────────────────────────────────────────────────
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on    # fill gaps when a window is closed

# Keep window names as set explicitly (e.g. via `t` function or `tmux rename-window`).
# Without these, the shell's terminal-title escape (e.g. hostname) overrides our names.
set -g allow-rename off
setw -g automatic-rename off

# ── Splits ────────────────────────────────────────────────────────────────────
# | for vertical split (side by side), - for horizontal split (top/bottom)
# new pane inherits current working directory
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ── Navigation (smart-splits) ──────────────────────────────────────────────────
# C-h/j/k/l moves between panes AND nvim splits seamlessly
# Handled by the smart-splits tmux plugin (loaded via TPM below)

# ── Resize ────────────────────────────────────────────────────────────────────
# A-h/j/k/l to match nvim resize bindings; -n means no prefix needed
bind -n M-h resize-pane -L 3
bind -n M-j resize-pane -D 3
bind -n M-k resize-pane -U 3
bind -n M-l resize-pane -R 3

# ── Zoom ──────────────────────────────────────────────────────────────────────
# prefix z  — toggle pane fullscreen (built-in, no rebind needed)

# ── Pane / window management ──────────────────────────────────────────────────
bind q confirm-before kill-window
bind x confirm-before -p "kill session #S? (y/n)" kill-session
bind r source-file ~/.config/tmux/tmux.conf \; display -d 800 "Reloaded"
bind R set-environment -gru TMUX_TPM_INITIALIZED \; source-file ~/.config/tmux/tmux.conf \; display -d 800 "Reloaded (full)"
bind k send-keys C-l \; clear-history    # clear pane + scrollback

# ── Window navigation ─────────────────────────────────────────────────────────
# S-Left/S-Right: cycle windows without prefix
# prefix-l: jump to last window (built-in)
bind -n S-Left previous-window
bind -n S-Right next-window

# ── Copy mode (vi keys) ────────────────────────────────────────────────────────
setw -g mode-keys vi
bind v copy-mode
bind -T copy-mode-vi v send -X begin-selection
# y: copy selection if active, otherwise yank whole line (vim yy reflex)
bind -T copy-mode-vi y if-shell -F "#{selection_active}" \
  "send -X copy-pipe-and-cancel 'pbcopy'" \
  "send -X start-of-line \; send -X begin-selection \; send -X end-of-line \; send -X copy-pipe-and-cancel 'pbcopy'"
# Y: yank from cursor to end of line (vim Y reflex)
bind -T copy-mode-vi Y send -X begin-selection \; send -X end-of-line \; send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-no-clear "pbcopy"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"

# ── Plugins (TPM) ─────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'mrjones2014/smart-splits.nvim'
set -g @plugin 'catppuccin/tmux#v2.3.0'

# ── Catppuccin theme ──────────────────────────────────────────────────────────
# Themes ONLY tmux UI (status bar, borders, message bar). Not nvim/ghostty/shell.
# Flavors: latte (light), frappe, macchiato, mocha (darkest)
set -g @catppuccin_flavor 'frappe'
set -g @catppuccin_window_status_style 'rounded'
# Render the application chip as a single uniform purple chip containing "1 home".
# Catppuccin status modules have separate icon / text sections with their own bgs;
# forcing both to mauve and putting #I #W together in the text section gives one
# clean chip. Empty icon string keeps the icon section width minimal.
set -g @catppuccin_application_text " #W"      # window name in text section
set -g @catppuccin_application_icon "#I "      # trailing space matches the padding on the folder/session icons
# Override only the icon-section bg to mauve. Text section keeps catppuccin's
# default (surface_0), preserving the original two-tone chip look — just with
# a number where the runner glyph used to be.
# NOTE: no -F. @thm_mauve is defined by the theme during `run tpm`, so it's
# unset here. Storing the literal expression lets catppuccin evaluate it later.
set -g @catppuccin_status_application_icon_bg "#{E:@thm_mauve}"

# Session module: show only session name (hide hostname default)
set -g @catppuccin_status_session_text "#S"

# Directory module: git-aware. Inside a repo shows <repo>/<subpath> (or just <repo>
# at the root); outside a repo shows the last two path segments. Truncated at 40
# chars so deep paths don't crowd the bar. Logic lives in path-shorten.sh.
set -g @catppuccin_directory_text " #{=40:#(~/.config/tmux/path-shorten.sh '#{pane_current_path}')}"

# Run TPM only once per server lifetime. Subsequent `prefix r` reloads then skip
# the slow plugin re-init (~4s → ~50ms). Trade-off: changing @catppuccin_* vars
# requires `tmux kill-server` to take effect, not just `prefix r`. For that case,
# use `prefix R` (capital) which forces a full reload by clearing the guard.
if-shell '[ -z "$TMUX_TPM_INITIALIZED" ]' \
  "run '~/.config/tmux/plugins/tpm/tpm'; set-environment -g TMUX_TPM_INITIALIZED 1"

# ── Status bar (must come after TPM loads catppuccin) ─────────────────────────
set -g status-position bottom
set -g status-left-length 200
set -g status-right-length 200
set -g status-left "#{E:@catppuccin_status_session}#{E:@catppuccin_status_application}#{E:@catppuccin_status_directory}"
set -g status-right ""

# Hide the window list entirely. Catppuccin sets these when it loads, so they
# must be set AFTER `run tpm` to take effect. The active window's name lives
# in the application chip on status-left; switch with prefix n/p/<num>.
set -g window-status-format ""
set -g window-status-current-format ""
set -g window-status-separator ""

# ── Pane borders ──────────────────────────────────────────────────────────────
set -g pane-border-lines heavy
set -gF pane-border-style "fg=#{@thm_overlay_0}"
set -gF pane-active-border-style "fg=#{@thm_mauve}"
